<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>

<style>

body{
font-family:Arial;
background:#fafafa;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
background:white;
padding:40px;
width:400px;
text-align:center;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

button{
padding:10px 20px;
background:#e74c3c;
border:none;
color:white;
border-radius:5px;
cursor:pointer;
margin-top:20px;
}

</style>
</head>

<body>

<div class="card">

<h1>Welcome to Social Media App</h1>

<p>Your identity has been successfully verified.</p>

<p><b>Status:</b> Age Verified ✔</p>

<button onclick="logout()">Logout</button>

</div>

<script>

if(sessionStorage.getItem("verified")!=="true"){
window.location.href="app.html";
}

function logout(){
sessionStorage.removeItem("verified");
window.location.href="app.html";
}

</script>

</body>
</html>
